spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/referly_db
    username: postgres
    password: postgres

  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    enabled: true

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}

#jwt:
#  secret: ${JWT_SECRET}
#  access-token-expiry-ms: 86400000
#  refresh-token-expiry-ms: 604800000

aws:
  s3:
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}
    bucket: ${AWS_BUCKET}